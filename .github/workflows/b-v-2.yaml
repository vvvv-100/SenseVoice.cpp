name: Build SenseVoice Vulkan (Win64)

on:
  workflow_dispatch:

jobs:
  build-vulkan:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: lovemefan/SenseVoice.cpp
          submodules: recursive

      # ---------- 1. 先让 CMake 能找到 Visual Studio ----------
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # ---------- 2. 下载头文件和 Loader 源码，编译生成 vulkan-1.dll ----------
      - name: Prepare Vulkan Headers and Loader
        run: |
          # 下载 Headers
          Invoke-WebRequest -Uri "https://github.com/KhronosGroup/Vulkan-Headers/archive/refs/tags/vulkan-sdk-1.4.304.1.zip" -OutFile headers.zip
          Expand-Archive headers.zip -DestinationPath .
          $headers_dir = "$pwd\Vulkan-Headers-vulkan-sdk-1.4.304.1"

          # 下载 Loader 源码
          Invoke-WebRequest -Uri "https://github.com/KhronosGroup/Vulkan-Loader/archive/refs/tags/vulkan-sdk-1.4.304.1.zip" -OutFile loader.zip
          Expand-Archive loader.zip -DestinationPath .
          $loader_dir = "$pwd\Vulkan-Loader-vulkan-sdk-1.4.304.1"

          # 编译 Loader（现在 MSBuild 已在 PATH 中）
          cd $loader_dir
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DUPDATE_DEPS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release -j $env:NUMBER_OF_PROCESSORS

          # 生成的文件路径
          $loader_dll = "$loader_dir\build\loader\Release\vulkan-1.dll"
          $loader_lib = "$loader_dir\build\loader\Release\vulkan-1.lib"

          # 保存到环境变量
          "VULKAN_HEADERS=$headers_dir" >> $env:GITHUB_ENV
          "VULKAN_LOADER_DLL=$loader_dll" >> $env:GITHUB_ENV
          "VULKAN_LOADER_LIB=$loader_lib" >> $env:GITHUB_ENV

      # ---------- 3. 编译 SenseVoice (开启 Vulkan) ----------
      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DGGML_VULKAN=ON `
            -DGGML_OPENBLAS=OFF `
            -DGGML_NATIVE=OFF `
            -DVulkan_INCLUDE_DIRS="${{ env.VULKAN_HEADERS }}/include" `
            -DVulkan_LIBRARY="${{ env.VULKAN_LOADER_LIB }}"

      - name: Build
        run: |
          cd build
          cmake --build . --config Release -j $env:NUMBER_OF_PROCESSORS

      # ---------- 4. 打包上传 ----------
      - name: Collect and Upload
        run: |
          mkdir artifact
          copy build\bin\Release\*.exe artifact\
          copy ${{ env.VULKAN_LOADER_DLL }} artifact\vulkan-1.dll

      - uses: actions/upload-artifact@v4
        with:
          name: sense-voice-vulkan-win64
          path: artifact/
