name: Build SenseVoice Vulkan (Win64)

on:
  workflow_dispatch:

jobs:
  build-vulkan:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: lovemefan/SenseVoice.cpp
          submodules: recursive

      # ---------- 1. 用 vcpkg 安装 Vulkan（头文件 + lib + dll） ----------
      - name: Install Vulkan via vcpkg
        run: |
          cd C:\vcpkg
          .\vcpkg.exe install vulkan-headers vulkan-loader --triplet x64-windows
          # 安装完成后，vcpkg 会提供库文件和头文件

      # ---------- 2. 编译 SenseVoice ----------
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DGGML_VULKAN=ON `
            -DGGML_OPENBLAS=OFF `
            -DGGML_NATIVE=OFF `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: |
          cd build
          cmake --build . --config Release -j $env:NUMBER_OF_PROCESSORS

      # ---------- 3. 打包，并带上 vulkan-1.dll ----------
      - name: Collect and Upload
        run: |
          mkdir artifact
          copy build\bin\Release\*.exe artifact\
          # 从 vcpkg 安装目录找到 vulkan-1.dll
          copy C:\vcpkg\packages\vulkan-loader_x64-windows\bin\vulkan-1.dll artifact\

      - uses: actions/upload-artifact@v4
        with:
          name: sense-voice-vulkan-win64
          path: artifact/
