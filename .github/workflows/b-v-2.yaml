name: Build SenseVoice Vulkan (Win64)

on:
  workflow_dispatch:

jobs:
  build-vulkan:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: lovemefan/SenseVoice.cpp
          submodules: recursive

      # ---------- 1. 安装 Vulkan Runtime（只需几十秒） ----------
      - name: Install Vulkan Runtime
        run: |
          # 下载在线安装器（约 2.5 MB）
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/1.4.304.1/windows/VulkanRT-1.4.304.1-Installer.exe" -OutFile vulkan-rt.exe
          # 静默安装（仅包含 vulkan-1.dll 和驱动）
          Start-Process -FilePath .\vulkan-rt.exe -ArgumentList "/S" -Wait -NoNewWindow
          # 确认 vulkan-1.dll 在 System32 中
          if (Test-Path "C:\Windows\System32\vulkan-1.dll") {
            Write-Host "Vulkan Runtime installed."
          } else {
            Write-Host "Installation may have failed, but continuing..."
          }

      # ---------- 2. 下载头文件（仅几十 MB） ----------
      - name: Download Vulkan Headers
        run: |
          Invoke-WebRequest -Uri "https://github.com/KhronosGroup/Vulkan-Headers/archive/refs/tags/vulkan-sdk-1.4.304.1.zip" -OutFile headers.zip
          Expand-Archive headers.zip -DestinationPath .
          # 设置环境变量，供 CMake 使用
          $headers_dir = "$pwd\Vulkan-Headers-vulkan-sdk-1.4.304.1"
          "VULKAN_SDK=$headers_dir" >> $env:GITHUB_ENV

      # ---------- 3. 编译 SenseVoice ----------
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DGGML_VULKAN=ON `
            -DGGML_OPENBLAS=OFF `
            -DGGML_NATIVE=OFF

      - name: Build
        run: |
          cd build
          cmake --build . --config Release -j $env:NUMBER_OF_PROCESSORS

      # ---------- 4. 打包 ----------
      - name: Collect and Upload
        run: |
          mkdir artifact
          copy build\bin\Release\*.exe artifact\
          # vulkan-1.dll 已在系统目录，通常不需要再随附，但为了移植性，可以复制一份
          copy C:\Windows\System32\vulkan-1.dll artifact\

      - uses: actions/upload-artifact@v4
        with:
          name: sense-voice-vulkan-win64
          path: artifact/
