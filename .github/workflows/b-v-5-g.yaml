name: Build SenseVoice Vulkan (Win64) - Static Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: lovemefan/SenseVoice.cpp
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      # 弃用 vcpkg，改用标准的官方 Vulkan SDK Action（自带 vulkan-1.lib 导入库与 glslc 编译器）
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.1.1
        with:
          version: 1.3.268.0
          cache: true

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          # Action 已经自动配置好了 VULKAN_SDK 环境变量和 PATH，
          # CMake 会自动以标准方式（动态链接）找到 Vulkan 库和 glslc.exe
          cmake .. -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DGGML_VULKAN=ON `
            -DGGML_OPENBLAS=OFF `
            -DGGML_NATIVE=OFF `
            -DVulkan_GLSLC_EXECUTABLE="$env:VULKAN_SDK\bin\glslc.exe"
            
          Write-Host "=== Checking Vulkan config ==="
          cmake -LA .. | Select-String "GGML_VULKAN|Vulkan"

      - name: Build
        run: |
          cd build
          ninja

      - name: Collect and Upload
        run: |
          mkdir artifact
          copy build\bin\*.exe artifact\
          # （已删除 copy vulkan-1.dll 的指令）
          # 程序在运行时会静默向用户的 C:\Windows\System32\vulkan-1.dll 请求支持

      - uses: actions/upload-artifact@v4
        with:
          name: sense-voice-vulkan-static-final
          path: artifact/
