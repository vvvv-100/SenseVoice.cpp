name: Build SenseVoice Vulkan (Win64) - Static Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: lovemefan/SenseVoice.cpp
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          cache: true

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DGGML_VULKAN=ON `
            -DGGML_OPENBLAS=OFF `
            -DGGML_NATIVE=OFF `
            -DVulkan_GLSLC_EXECUTABLE="$env:VULKAN_SDK\bin\glslc.exe"
            
          Write-Host "=== Checking Vulkan config ==="
          cmake -LA .. | Select-String "GGML_VULKAN|Vulkan"

      - name: Build
        run: |
          cd build
          ninja

      - name: Collect and Upload
        run: |
          mkdir artifact
          copy build\bin\*.exe artifact\
          copy build\bin\*.dll artifact\

      - uses: actions/upload-artifact@v4
        with:
          name: sense-voice-vulkan-static-final
          path: artifact/
